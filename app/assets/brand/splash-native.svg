<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Fundo transparente: cor roxa vem de splash backgroundColor no app.json -->
  <!-- Emblema central: círculo + moldura de colchetes + Luxai -->
  <g transform="translate(400, 400)">
    <circle cx="0" cy="0" r="270" fill="none" stroke="#F8F8F8" stroke-width="5" opacity="0.85"/>
    <circle cx="0" cy="0" r="258" fill="none" stroke="#F8F8F8" stroke-width="2" opacity="0.4"/>

    <g fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="square">
      <path d="M -180 -110 L -180 -180 L -110 -180"/>
