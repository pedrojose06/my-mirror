<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2340" width="1080" height="2340">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#9b3fe8"/>
      <stop offset="55%" stop-color="#7d28cf"/>
      <stop offset="100%" stop-color="#5d1aa6"/>
    </radialGradient>
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#3d0f73" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Fundo roxo radial -->
  <rect width="1080" height="2340" fill="url(#bg)"/>

  <!-- Emblema central: círculo + moldura de colchetes + Luxai -->
  <g filter="url(#emboss)">
    <!-- Círculo externo -->
    <circle cx="540" cy="980" r="270" fill="none" stroke="#F8F8F8" stroke-width="5" opacity="0.85"/>
    <circle cx="540" cy="980" r="258" fill="none" stroke="#F8F8F8" stroke-width="2" opacity="0.4"/>

    <!-- Moldura de colchetes (isotipo) -->
    <g fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="square">
      <path d="M 360 870 L 360 800 L 430 800"/>
      <path d="M 650 800 L 720 800 L 720 870"/>
      <path d="M 360 1090 L 360 1160 L 430 1160"/>
      <path d="M 650 1160 L 720 1160 L 720 1090"/>
    </g>
    <g fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="square" opacity="0.5">
      <path d="M 398 888 L 398 838 L 448 838"/>
      <path d="M 632 838 L 682 838 L 682 888"/>
      <path d="M 398 1072 L 398 1122 L 448 1122"/>
      <path d="M 632 1122 L 682 1122 L 682 1072"/>
    </g>

    <!-- Texto Luxai -->
    <g transform="translate(540, 980)">
      <text x="-6" y="48"
            font-family="'Goudy Old Style', 'Garamond', 'Hoefler Text', serif"
            font-size="170" font-weight="400" fill="#FFFFFF"
            text-anchor="end">Lux</text>
      <text x="6" y="48"
            font-family="'Futura', 'Century Gothic', 'Avenir', sans-serif"
            font-size="170" font-weight="500" fill="#F0F0F0"
            text-anchor="start">ai</text>
    </g>
  </g>

  <!-- Tagline -->
  <text x="540" y="2120"
        font-family="'Montserrat', 'Segoe UI', sans-serif"
        font-size="40" font-weight="500" fill="#FFFFFF"
        letter-spacing="6" text-anchor="middle" opacity="0.92">FASHION APP  |  PREMIUM AI STYLIST</text>

  <!-- Brilhos decorativos -->
  <g fill="#FFFFFF" opacity="0.9">
    <path d="M 945 1985 l 14 34 l 34 14 l -34 14 l -14 34 l -14 -34 l -34 -14 l 34 -14 z"/>
    <path d="M 1010 2090 l 9 22 l 22 9 l -22 9 l -9 22 l -9 -22 l -22 -9 l 22 -9 z" opacity="0.7"/>
  </g>
</svg>
