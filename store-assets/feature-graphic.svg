<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#9b3fe8"/>
      <stop offset="60%" stop-color="#7d28cf"/>
      <stop offset="100%" stop-color="#5d1aa6"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Emblema (frame de colchetes) à esquerda -->
  <g transform="translate(250, 250)" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="square">
    <path d="M -150 -70 L -150 -120 L -100 -120"/>
    <path d="M 100 -120 L 150 -120 L 150 -70"/>
    <path d="M -150 70 L -150 120 L -100 120"/>
    <path d="M 100 120 L 150 120 L 150 70"/>
  </g>
  <g transform="translate(250, 250)">
    <text x="-6" y="34"
          font-family="'Goudy Old Style','Garamond',serif" font-size="120"
          font-weight="400" fill="#FFFFFF" text-anchor="end">Lux</text>
    <text x="6" y="34"
          font-family="'Futura','Century Gothic',sans-serif" font-size="120"
          font-weight="500" fill="#F0F0F0" text-anchor="start">ai</text>
  </g>

  <!-- Texto à direita -->
  <g transform="translate(470, 0)">
    <text x="0" y="220"
          font-family="'Goudy Old Style','Garamond',serif" font-size="64"
          font-weight="700" fill="#FFFFFF">Seu espelho</text>
    <text x="0" y="290"
          font-family="'Goudy Old Style','Garamond',serif" font-size="64"
          font-weight="700" fill="#FFFFFF">inteligente</text>
    <text x="0" y="345"
          font-family="'Montserrat','Segoe UI',sans-serif" font-size="28"
          font-weight="400" fill="#FFFFFF" opacity="0.9" letter-spacing="2">Avalie seu look com IA</text>
  </g>

  <!-- Brilhos -->
  <g fill="#FFFFFF" opacity="0.9">
    <path d="M 930 90 l 12 28 l 28 12 l -28 12 l -12 28 l -12 -28 l -28 -12 l 28 -12 z"/>
    <path d="M 975 170 l 7 17 l 17 7 l -17 7 l -7 17 l -7 -17 l -17 -7 l 17 -7 z" opacity="0.7"/>
  </g>
</svg>
